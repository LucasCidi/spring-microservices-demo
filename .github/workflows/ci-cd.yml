name: CI/CD pipeline

on: # QUANDO ela executa
  push:
    branches: ["main", "master"]
  pull_request:
    branches: ["main", "master"]

permissions:
  contents: read
  packages: write

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest
    environment: test

    steps:
      - name: Checkout Código
        uses: actions/checkout@v4

      - name: Configurar JDK 21 (Eclipse Temurin)
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'
      
      - name: Compilar e instalar o Módulo 'commons'
        run: |
          cd commons
          mvn clean install

      - name: Compilar e testar o 'microservico1'
        run: |
          cd microservico1
          mvn clean test

      - name: Compilar e testar o 'microservico2'
        run: |
          cd microservico2
          mvn clean test

      - name: Upload dos relatórios de teste (JaCoCo)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-coverage-report
          path: microservico2/target/site/jacoco
      
      - name: Upload dos relatórios JUnit
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: junit-test-reports
          path: |
            microservico1/target/surefire-reports/
            microservico2/target/surefire-reports/