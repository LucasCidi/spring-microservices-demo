name: CI/CD pipeline

on: # QUANDO ela executa
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs: # O que ela faz (cada job roda numa VM separada)
  build-commons:
    runs-on: ubuntu-latest # tipo de máquina
    steps: # passos dentro do job
      - name: Baixar código
        uses: actions/checkout@v4

      - name: Configurar Java 21
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"
          cache: maven

      - name: Compilar e instalar commons no cache local
        run: mvn install -f commons/pom.xml -DskipTests

      - name: Salvar commons como artefato
        uses: actions/upload-artifact@v4
        with:
          name: commons-jar
          path: commons/target/commons-1.0.jar

  build-microservice1:
    runs-on: ubuntu-latest
    needs: build-commons
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"
          cache: maven

      - uses: actions/download-artifact@v4
        with:
          name: commons-jar
          path: commons/target/

      - name: Instalar commons localmente
        run: mvn install:install-file -Dfile=commons/target/commons-1.0.jar
          -DgroupId=br.pucrs.microdemo -DartifactId=commons
          -Dversion=1.0 -Dpackaging=jar

      - name: Build e testes do microserviço1
        run: mvn verify -f microservico1/pom.xml

  build-microservice2:
    runs-on: ubuntu-latest
    needs: build-commons
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"
          cache: maven

      - uses: actions/download-artifact@v4
        with:
          name: commons-jar
          path: commons/target/

      - name: Isolar commons localmente
        run: mvn install:install-file -Dfile=commons/target/commons-1.0.jar
          -DgroupId=br.pucrs.microdemo -DartifactId=commons
          -Dversion=1.0 -Dpackaging=jar

      - name: Build, testes e cobertura jaCoCo
        run: mvn verify -f microservico2/pom.xml

      - name: Salvar relatório de cobertura
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-report
          path: microservico2/target/site/jacoco/
